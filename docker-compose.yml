services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: availability_matrix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d availability_matrix"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/availability_matrix
      FRONTEND_ORIGIN: http://localhost:4200
      HOST: 0.0.0.0
      JWT_SECRET: change-me-in-production
      PORT: "3000"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4200:80"

volumes:
  postgres_data:
