services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      DATABASE_URL: "sqlite://data/app.db"
      JWT_SECRET: "change-me-in-production"
      FRONTEND_ORIGIN: "http://localhost:4200"
    volumes:
      - sqlite_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
